spring.application.name=hcbs

spring.datasource.url=jdbc:h2:file:./data/hcbs-db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

vaadin.launch-browser=true
vaadin.allowed-packages=com.vaadin,org.vaadin,dev.hilla,com.eduaccess

logging.level.com.eduaccess=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# File upload size limits (used by Manager film poster upload)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# Let Spring MVC handle /uploads/** so that uploaded posters are reachable
# instead of being intercepted by the Vaadin servlet at "/*".
vaadin.exclude-urls=/h2-console/**,/uploads/**
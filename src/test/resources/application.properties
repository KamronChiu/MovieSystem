# Test profile — uses an in-memory H2 database so each test starts
# from a clean schema and tests do not interfere with the dev database.
spring.datasource.url=jdbc:h2:mem:hcbs-test;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# Disable Vaadin servlet for backend-only integration tests.
vaadin.launch-browser=false

logging.level.com.eduaccess=WARN
logging.level.org.springframework.web=ERROR
logging.level.org.hibernate.SQL=ERROR
